name: Build and Deploy RevOps Digital FTE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Validation Sprint
      run: |
        # Ensure Stage 1 and Stage 2 validations pass before deploy
        python -m pytest shared/tests/test_enricher.py shared/tests/test_logic.py

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Gateway
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/gateway/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_REGISTRY }}/revops-gateway:latest
        
    - name: Build and push Worker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/worker/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_REGISTRY }}/revops-worker:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}
    
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/revops-base.yaml
        kubectl apply -f k8s/gateway-deployment.yaml
        kubectl apply -f k8s/worker-deployment.yaml
        kubectl rollout status deployment/revops-gateway -n revops
        kubectl rollout status deployment/revops-worker -n revops
