apiVersion: apps/v1
kind: Deployment
metadata:
  name: revops-gateway
  namespace: revops
  labels:
    app: revops-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: revops-gateway
  template:
    metadata:
      labels:
        app: revops-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: gateway
        image: your-repo/revops-gateway:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: revops-config
        - secretRef:
            name: revops-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: revops-gateway
  namespace: revops
spec:
  selector:
    app: revops-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
