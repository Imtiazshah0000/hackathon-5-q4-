apiVersion: apps/v1
kind: Deployment
metadata:
  name: revops-worker
  namespace: revops
  labels:
    app: revops-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: revops-worker
  template:
    metadata:
      labels:
        app: revops-worker
    spec:
      containers:
      - name: worker
        image: your-repo/revops-worker:latest
        envFrom:
        - configMapRef:
            name: revops-config
        - secretRef:
            name: revops-secrets
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: revops-worker-hpa
  namespace: revops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: revops-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
